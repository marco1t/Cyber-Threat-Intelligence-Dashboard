name: Mise à jour quotidienne du Cyber Dashboard

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Je récupère mon dépôt (Checkout)
        uses: actions/checkout@v4

      - name: Je prépare Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: J'installe mes dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: J'exécute mon script de récupération Threat Intel
        run: python scripts/fetch_data.py
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Je vérifie les changements et je commit mes nouveautés
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add docs/data/data.json README.md
          
          # Si mon script a généré de nouveaux fichiers, je les inclus dans mon tableau de bord
          if git diff-index --quiet HEAD; then
            echo "Aucune nouvelle donnée majeure, je ne pollue pas mon historique Git."
          else
            DATE=$(date +"%d/%m/%Y")
            git commit -m "Mise à jour(veille) : nouvelles données du $DATE"
            git push
            echo "J'ai bien mis à jour mon graphe et mon projet avec les nouvelles données."
          fi
